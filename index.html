<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Sharav Inventory</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    :root {
      --green-dark: #1b5e20;
      --green-mid:  #2e7d32;
      --green-light:#4caf50;
      --green-pale: #e8f5e9;
      --accent:     #00897b;
      --warn:       #f57c00;
      --danger:     #c62828;
      --white:      #ffffff;
      --grey-100:   #f5f5f5;
      --grey-200:   #eeeeee;
      --grey-400:   #bdbdbd;
      --grey-700:   #616161;
      --text:       #212121;
      --radius:     10px;
      --shadow:     0 2px 12px rgba(0,0,0,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--grey-100);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ──────────────────────────────────────── */
    header {
      background: var(--green-dark);
      color: var(--white);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: 0.5px; }
    header span { font-size: 0.75rem; opacity: 0.75; margin-left: auto; }

    /* ── VIEWS ───────────────────────────────────────── */
    .view { display: none; flex: 1; flex-direction: column; }
    .view.active { display: flex; }

    /* ── SETUP VIEW ──────────────────────────────────── */
    #view-setup {
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .setup-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 24px;
      width: 100%;
      max-width: 420px;
    }
    .setup-logo {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .setup-logo img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .setup-card h2 {
      text-align: center;
      font-size: 1.4rem;
      color: var(--green-dark);
      margin-bottom: 4px;
    }
    .setup-card p {
      text-align: center;
      font-size: 0.82rem;
      color: var(--grey-700);
      margin-bottom: 24px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--grey-700);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field input, .field select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--grey-400);
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
      outline: none;
      background: var(--white);
    }
    .field input:focus, .field select:focus { border-color: var(--green-mid); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-decoration: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--green-mid); color: var(--white); width: 100%; }
    .btn-primary:hover { background: var(--green-dark); }
    .btn-secondary { background: var(--grey-200); color: var(--text); }
    .btn-secondary:hover { background: var(--grey-400); }
    .btn-accent { background: var(--accent); color: var(--white); }
    .btn-accent:hover { background: #00695c; }
    .btn-warn { background: var(--warn); color: var(--white); }
    .btn-danger { background: var(--danger); color: var(--white); }
    .btn-sm { padding: 7px 12px; font-size: 0.82rem; }

    /* ── SCAN VIEW ───────────────────────────────────── */
    #view-scan { padding: 0; overflow: hidden; }

    .scan-top {
      background: var(--white);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--grey-200);
      flex-shrink: 0;
    }
    .scan-badge {
      background: var(--green-pale);
      color: var(--green-dark);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem;
      font-weight: 700;
    }
    .scan-info { font-size: 0.8rem; color: var(--grey-700); }
    .scan-info strong { color: var(--text); }

    /* camera region */
    #reader-wrapper {
      position: relative;
      background: #000;
      flex-shrink: 0;
      max-height: 38vh;
      overflow: hidden;
    }
    #reader {
      width: 100%;
    }
    /* Override html5-qrcode UI */
    #reader video { width: 100% !important; height: auto !important; display: block; }
    #reader img { display: none !important; }

    .scan-overlay-text {
      position: absolute;
      bottom: 8px;
      left: 0; right: 0;
      text-align: center;
      color: rgba(255,255,255,0.85);
      font-size: 0.78rem;
      pointer-events: none;
    }

    /* Manual entry bar */
    .manual-bar {
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      background: var(--white);
      border-bottom: 1px solid var(--grey-200);
      flex-shrink: 0;
    }
    .manual-bar input {
      flex: 1;
      padding: 9px 12px;
      border: 1.5px solid var(--grey-400);
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
    }
    .manual-bar input:focus { border-color: var(--green-mid); }

    /* toast / duplicate warning */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--warn);
      color: var(--white);
      padding: 11px 20px;
      border-radius: 24px;
      font-size: 0.88rem;
      font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      z-index: 500;
      transition: transform 0.3s ease;
      white-space: nowrap;
      max-width: 90vw;
      text-align: center;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--green-mid); }
    #toast.error { background: var(--danger); }

    /* recent scans list */
    .recent-header {
      padding: 8px 14px 4px;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--grey-700);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--grey-100);
      flex-shrink: 0;
    }
    #recent-list {
      flex: 1;
      overflow-y: auto;
      background: var(--grey-100);
    }
    .scan-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--grey-200);
      background: var(--white);
      animation: slideIn 0.2s ease;
    }
    .scan-item.duplicate { background: #fff8e1; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .scan-num {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--green-pale);
      color: var(--green-dark);
      font-size: 0.72rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .scan-num.dup { background: #fff3cd; color: var(--warn); }
    .scan-code { flex: 1; font-size: 0.9rem; font-family: monospace; font-weight: 600; }
    .scan-meta { font-size: 0.72rem; color: var(--grey-700); }
    .scan-time { font-size: 0.7rem; color: var(--grey-400); flex-shrink: 0; }

    .scan-footer {
      padding: 10px 14px;
      background: var(--white);
      border-top: 1px solid var(--grey-200);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── REVIEW VIEW ─────────────────────────────────── */
    #view-review {
      flex-direction: column;
      overflow: hidden;
    }
    .review-toolbar {
      padding: 10px 14px;
      background: var(--white);
      border-bottom: 1px solid var(--grey-200);
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .review-toolbar h3 { font-size: 0.95rem; flex: 1; }
    #review-table-wrap {
      flex: 1;
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    thead th {
      background: var(--green-dark);
      color: var(--white);
      padding: 9px 10px;
      text-align: left;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: sticky;
      top: 0;
      white-space: nowrap;
    }
    tbody tr:nth-child(even) { background: var(--grey-100); }
    tbody tr:hover { background: var(--green-pale); }
    tbody td {
      padding: 7px 10px;
      border-bottom: 1px solid var(--grey-200);
      vertical-align: middle;
    }
    tbody td input, tbody td select {
      width: 100%;
      min-width: 80px;
      padding: 4px 6px;
      border: 1px solid var(--grey-400);
      border-radius: 4px;
      font-size: 0.82rem;
      font-family: inherit;
      background: var(--white);
    }
    tbody td input:focus, tbody td select:focus {
      outline: none;
      border-color: var(--green-mid);
    }
    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--danger);
      font-size: 1rem;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .del-btn:hover { background: #ffebee; }

    /* ── EMAIL MODAL ─────────────────────────────────── */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }
    .modal h3 { margin-bottom: 16px; color: var(--green-dark); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

    /* ── CATEGORY CHIPS ──────────────────────────────── */
    .cat-select {
      font-size: 0.78rem;
      padding: 3px 6px;
      border: 1px solid var(--grey-400);
      border-radius: 4px;
      background: var(--white);
      min-width: 110px;
    }

    /* responsive tweaks */
    @media (max-width: 480px) {
      thead th:nth-child(1),
      tbody td:nth-child(1) { display: none; }
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--grey-700);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
  </style>
</head>
<body>

<!-- ── HEADER ───────────────────────────────────────── -->
<header>
  <img src="logo.png" alt="Sharav Inventory" />
  <h1>Sharav Inventory</h1>
  <span id="header-info"></span>
</header>

<!-- ══════════════════════════════════════════════════ -->
<!--  VIEW 1 – SETUP                                   -->
<!-- ══════════════════════════════════════════════════ -->
<div id="view-setup" class="view active">
  <div class="setup-card">
    <div class="setup-logo">
      <img src="logo.png" alt="Sharavships Ltd." />
    </div>
    <h2>Sharav Inventory</h2>
    <p>Sharavships Ltd. &mdash; Rapid Stock Count Tool</p>

    <div class="field">
      <label>Your Name</label>
      <input type="text" id="setup-name" placeholder="e.g. John Smith" autocomplete="name" />
    </div>
    <div class="field">
      <label>Location / Store</label>
      <input type="text" id="setup-location" placeholder="e.g. Engine Room Store / M1" autocomplete="off" />
    </div>
    <button class="btn btn-primary" onclick="startSession()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
      Start Scanning Session
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════ -->
<!--  VIEW 2 – SCANNING                                -->
<!-- ══════════════════════════════════════════════════ -->
<div id="view-scan" class="view">

  <div class="scan-top">
    <div>
      <div class="scan-info"><strong id="scan-person-label"></strong> &nbsp;|&nbsp; <span id="scan-loc-label"></span></div>
    </div>
    <span class="scan-badge" id="scan-count-badge">0 scanned</span>
  </div>

  <div id="reader-wrapper">
    <div id="reader"></div>
    <div class="scan-overlay-text">Point camera at barcode</div>
  </div>

  <div class="manual-bar">
    <input type="text" id="manual-input" placeholder="Or type / paste barcode here…" autocomplete="off"
           onkeydown="if(event.key==='Enter') addManual()" />
    <button class="btn btn-secondary btn-sm" onclick="addManual()">Add</button>
  </div>

  <div class="recent-header">Recent Scans</div>
  <div id="recent-list"></div>

  <div class="scan-footer">
    <button class="btn btn-secondary btn-sm" style="flex:1" onclick="goSetup()">
      ← Back
    </button>
    <button class="btn btn-primary" style="flex:2" onclick="goReview()">
      Review &amp; Export →
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════ -->
<!--  VIEW 3 – REVIEW / EDIT / EXPORT                  -->
<!-- ══════════════════════════════════════════════════ -->
<div id="view-review" class="view">

  <div class="review-toolbar">
    <button class="btn btn-secondary btn-sm" onclick="goScan()">← Back to Scan</button>
    <h3 id="review-title">Inventory Review</h3>
    <button class="btn btn-accent btn-sm" onclick="exportCSV()">
      ⬇ CSV
    </button>
    <button class="btn btn-primary btn-sm" onclick="openEmailModal()">
      ✉ Email
    </button>
  </div>

  <div id="review-table-wrap">
    <table id="review-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Date</th>
          <th>Location</th>
          <th>Person</th>
          <th>Part Number</th>
          <th>Category</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="review-tbody"></tbody>
    </table>
    <div class="empty-state" id="review-empty" style="display:none">
      <div class="icon">📦</div>
      <p>No items scanned yet.</p>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════ -->
<!--  EMAIL MODAL                                      -->
<!-- ══════════════════════════════════════════════════ -->
<div class="modal-bg" id="email-modal">
  <div class="modal">
    <h3>Email CSV</h3>
    <div class="field">
      <label>Recipient Email</label>
      <input type="email" id="email-to" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label>Subject</label>
      <input type="text" id="email-subject" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary btn-sm" onclick="closeEmailModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="sendEmail()">Open in Mail App</button>
    </div>
  </div>
</div>

<!-- ── TOAST ─────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ══════════════════════════════════════════════════ -->
<!--  JAVASCRIPT                                       -->
<!-- ══════════════════════════════════════════════════ -->
<script>
/* ── State ─────────────────────────────────────────── */
let session = {
  person: '',
  location: '',
  date: '',
  scans: []          // [{id, barcode, category, date, location, person, duplicate}]
};

let scanner = null;
let toastTimer = null;
const CATEGORIES = [
  '', 'Engine', 'Electrical', 'Hydraulic', 'Mechanical', 'Safety',
  'Filters', 'Fuel System', 'Cooling', 'Navigation', 'Deck', 'Other'
];

/* ── Helpers ────────────────────────────────────────── */
function today() {
  return new Date().toISOString().slice(0, 10);
}
function nowTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showToast(msg, type = 'warn') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3200);
}
function updateHeaderInfo() {
  document.getElementById('header-info').textContent =
    session.person ? `${session.person} · ${session.location}` : '';
}

/* ── SETUP ──────────────────────────────────────────── */
function startSession() {
  const name = document.getElementById('setup-name').value.trim();
  const loc  = document.getElementById('setup-location').value.trim();
  if (!name) { showToast('Please enter your name', 'error'); return; }
  if (!loc)  { showToast('Please enter a location', 'error'); return; }

  session.person   = name;
  session.location = loc;
  session.date     = today();
  session.scans    = [];

  updateHeaderInfo();
  document.getElementById('scan-person-label').textContent = name;
  document.getElementById('scan-loc-label').textContent    = loc;
  document.getElementById('scan-count-badge').textContent  = '0 scanned';
  document.getElementById('recent-list').innerHTML         = '';

  showView('view-scan');
  startScanner();
}

function goSetup() {
  stopScanner();
  showView('view-setup');
}

/* ── SCANNER ─────────────────────────────────────────── */
function startScanner() {
  if (scanner) {
    scanner.resume().catch(() => {});
    return;
  }
  scanner = new Html5Qrcode('reader');

  const config = {
    fps: 15,
    qrbox: { width: 260, height: 100 },
    supportedScanTypes: [
      Html5QrcodeScanType.SCAN_TYPE_CAMERA
    ],
    formatsToSupport: [
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.ITF,
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.PDF_417,
      Html5QrcodeSupportedFormats.DATA_MATRIX,
    ]
  };

  Html5Qrcode.getCameras().then(cameras => {
    if (!cameras || cameras.length === 0) {
      showToast('No camera found – use manual entry', 'error');
      return;
    }
    // prefer back camera
    const cam = cameras.find(c => /back|rear|environment/i.test(c.label)) || cameras[cameras.length - 1];
    scanner.start(
      { deviceId: { exact: cam.id } },
      config,
      onScanSuccess,
      () => {}   // silence per-frame errors
    ).catch(err => {
      // fallback: any camera
      scanner.start({ facingMode: 'environment' }, config, onScanSuccess, () => {}).catch(e2 => {
        showToast('Camera access denied – use manual entry', 'error');
      });
    });
  }).catch(() => {
    showToast('Camera permission denied', 'error');
  });
}

function stopScanner() {
  if (scanner) {
    scanner.stop().catch(() => {});
    scanner = null;
  }
}

let lastScanned = '';
let lastScannedTime = 0;
const DEBOUNCE_MS = 1800;   // avoid double-scan same code within 1.8 s

function onScanSuccess(barcode) {
  const now = Date.now();
  if (barcode === lastScanned && (now - lastScannedTime) < DEBOUNCE_MS) return;
  lastScanned     = barcode;
  lastScannedTime = now;
  addScan(barcode.trim());
}

/* ── SCAN LOGIC ─────────────────────────────────────── */
function addScan(barcode) {
  if (!barcode) return;

  const isDup = session.scans.some(s => s.barcode === barcode);

  const entry = {
    id:       crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
    barcode,
    category: '',
    date:     session.date,
    location: session.location,
    person:   session.person,
    time:     nowTime(),
    duplicate: isDup
  };

  session.scans.unshift(entry);   // newest first
  updateScanCount();
  renderRecentItem(entry);

  if (isDup) {
    showToast(`⚠ Duplicate: ${barcode}`, 'warn');
  } else {
    showToast(`✓ Scanned: ${barcode}`, 'success');
  }

  // vibrate on mobile
  if (navigator.vibrate) navigator.vibrate(isDup ? [80, 60, 80] : 60);
}

function addManual() {
  const inp = document.getElementById('manual-input');
  const val = inp.value.trim();
  if (val) {
    addScan(val);
    inp.value = '';
    inp.focus();
  }
}

function updateScanCount() {
  document.getElementById('scan-count-badge').textContent =
    `${session.scans.length} scanned`;
}

function renderRecentItem(entry) {
  const list = document.getElementById('recent-list');
  const div  = document.createElement('div');
  div.className = `scan-item${entry.duplicate ? ' duplicate' : ''}`;
  div.dataset.id = entry.id;

  const num = session.scans.length; // newest = first in array
  div.innerHTML = `
    <div class="scan-num ${entry.duplicate ? 'dup' : ''}">${num}</div>
    <div class="scan-code">${escHtml(entry.barcode)}</div>
    <div class="scan-time">${entry.time}</div>
  `;
  list.prepend(div);
}

/* ── REVIEW ─────────────────────────────────────────── */
function goReview() {
  stopScanner();
  renderReviewTable();
  const title = `${session.location} · ${session.date} · ${session.scans.length} items`;
  document.getElementById('review-title').textContent = title;
  showView('view-review');
}

function goScan() {
  showView('view-scan');
  startScanner();
}

function renderReviewTable() {
  const tbody = document.getElementById('review-tbody');
  const empty = document.getElementById('review-empty');
  tbody.innerHTML = '';

  if (session.scans.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  // Show in scan order (newest first in session.scans, reverse for table)
  const ordered = [...session.scans].reverse();
  ordered.forEach((entry, i) => {
    const tr = document.createElement('tr');
    tr.dataset.id = entry.id;
    tr.innerHTML = `
      <td>${i + 1}</td>
      <td><input type="date" value="${escHtml(entry.date)}" onchange="updateField('${entry.id}','date',this.value)" /></td>
      <td><input type="text"  value="${escHtml(entry.location)}" onchange="updateField('${entry.id}','location',this.value)" /></td>
      <td><input type="text"  value="${escHtml(entry.person)}"   onchange="updateField('${entry.id}','person',this.value)" /></td>
      <td><input type="text"  value="${escHtml(entry.barcode)}"  onchange="updateField('${entry.id}','barcode',this.value)" style="font-family:monospace;font-weight:600"/></td>
      <td>${categorySelect(entry)}</td>
      <td><button class="del-btn" onclick="deleteEntry('${entry.id}')" title="Remove">✕</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function categorySelect(entry) {
  const opts = CATEGORIES.map(c =>
    `<option value="${c}" ${entry.category === c ? 'selected' : ''}>${c || '— select —'}</option>`
  ).join('');
  return `<select class="cat-select" onchange="updateField('${entry.id}','category',this.value)">${opts}</select>`;
}

function updateField(id, field, value) {
  const entry = session.scans.find(s => s.id === id);
  if (entry) entry[field] = value;
}

function deleteEntry(id) {
  session.scans = session.scans.filter(s => s.id !== id);
  document.querySelector(`[data-id="${id}"]`)?.remove();
  updateScanCount();
  if (session.scans.length === 0) {
    document.getElementById('review-empty').style.display = 'block';
  }
}

/* ── EXPORT CSV ─────────────────────────────────────── */
function buildCSV() {
  const header = ['Date', 'Location', 'Person', 'Part Number', 'Part Category'];
  const rows   = [...session.scans].reverse().map(e => [
    e.date, e.location, e.person, e.barcode, e.category
  ]);
  return [header, ...rows]
    .map(r => r.map(cell => `"${String(cell ?? '').replace(/"/g, '""')}"`).join(','))
    .join('\r\n');
}

function exportCSV() {
  const csv      = buildCSV();
  const blob     = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url      = URL.createObjectURL(blob);
  const a        = document.createElement('a');
  const filename = `sharav_inventory_${session.location.replace(/\s+/g,'_')}_${session.date}.csv`;
  a.href         = url;
  a.download     = filename;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV downloaded', 'success');
}

/* ── EMAIL ──────────────────────────────────────────── */
function openEmailModal() {
  document.getElementById('email-to').value = '';
  document.getElementById('email-subject').value =
    `Inventory – ${session.location} – ${session.date}`;
  document.getElementById('email-modal').classList.add('open');
}
function closeEmailModal() {
  document.getElementById('email-modal').classList.remove('open');
}
function sendEmail() {
  const to      = document.getElementById('email-to').value.trim();
  const subject = encodeURIComponent(document.getElementById('email-subject').value);
  const csv     = buildCSV();

  // Build a plain-text body with the CSV content
  const body    = encodeURIComponent(
    `Please find the inventory data below (also save the attached CSV).\n\n` +
    `Session: ${session.location} | ${session.person} | ${session.date}\n` +
    `Items: ${session.scans.length}\n\n` +
    `--- CSV DATA ---\n` + csv
  );

  // Download CSV first so user can attach it
  exportCSV();

  // Open mail client
  window.location.href = `mailto:${encodeURIComponent(to)}?subject=${subject}&body=${body}`;
  closeEmailModal();
}

/* ── UTILITY ─────────────────────────────────────────── */
function escHtml(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── PERSIST SESSION ─────────────────────────────────── */
// Auto-save to localStorage so a page refresh doesn't lose data
function saveLocal() {
  try { localStorage.setItem('sharav_session', JSON.stringify(session)); } catch(e) {}
}
function loadLocal() {
  try {
    const raw = localStorage.getItem('sharav_session');
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s && s.person && s.location) {
      session = s;
      document.getElementById('setup-name').value     = s.person;
      document.getElementById('setup-location').value = s.location;
    }
  } catch(e) {}
}

// Save on any scan change
const origAddScan = addScan;
window.addScan = function(b) { origAddScan(b); saveLocal(); };

loadLocal();
</script>
</body>
</html>
